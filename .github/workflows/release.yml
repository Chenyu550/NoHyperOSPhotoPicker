name: Build Release APK

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0, v1.2.3
  workflow_dispatch:  # Allow manual runs from the Actions tab

jobs:
  build:
    name: Build & sign release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ── 3. Gradle wrapper permissions ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Build release APK ─────────────────────────────────────────────────
      #
      # The app/build.gradle.kts uses the built-in debug signingConfig for the
      # release variant so that the APK is always signed (LSPosed requires a
      # signed APK).  For production use, replace this step with a proper
      # keystore stored in GitHub Secrets — see the commented step below.
      #
      - name: Build release APK (debug-signed)
        run: ./gradlew assembleRelease --no-daemon

      # ── (Optional) Production signing with a real keystore ───────────────────
      # Uncomment and configure these secrets in your repo settings:
      #   KEYSTORE_BASE64  — base64-encoded .jks file
      #   KEY_ALIAS        — key alias
      #   KEY_PASSWORD     — key password
      #   STORE_PASSWORD   — store password
      #
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
      #
      # - name: Sign APK
      #   run: |
      #     $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
      #       --ks keystore.jks \
      #       --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
      #       --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" \
      #       --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
      #       --out app/build/outputs/apk/release/app-release-signed.apk \
      #       app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 5. Upload APK as artifact ─────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperBlocker-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 6. Create GitHub Release (only on tag pushes) ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
